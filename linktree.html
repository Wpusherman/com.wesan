<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNSとかとか</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #0d1b2a;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1b263b 0%, #0d1b2a 100%);
        }

        .bg-animation::before, .bg-animation::after {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(65, 90, 119, 0.4) 0%, transparent 70%);
            border-radius: 50%;
            animation: move 15s infinite alternate ease-in-out;
        }

        .bg-animation::after {
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(119, 141, 169, 0.25) 0%, transparent 70%);
            animation: move 25s infinite alternate-reverse ease-in-out;
            right: -10%;
            top: 10%;
        }

        @keyframes move {
            from { transform: translate(-20%, -20%); }
            to { transform: translate(30%, 30%); }
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 2px solid #415a77; 
            padding: 40px 25px;       
            border-radius: 25px;      
            
            background-color: rgba(27, 38, 59, 0.85); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .lang-switch {
            margin-bottom: 20px;
            position: relative;
        }
        .lang-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #ffffff33;
            color: white;
            padding: 5px 12px;
            cursor: pointer;
            margin: 0 5px;
            border-radius: 5px;
            transition: 0.3s;
            font-size: 0.8rem;
        }
        .lang-btn:hover {
            background: #ffffff33;
        }

        .profile img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid #415a77;
            margin-bottom: 10px;
            object-fit: cover;
        }
        .profile h1 {
            font-size: 1.5rem;
            margin-bottom: 30px;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            background-color: rgba(13, 27, 42, 0.8);
            color: white;
            text-decoration: none;
            margin-bottom: 15px;
            padding: 15px 20px;
            border-radius: 12px;
            transition: all 0.3s ease;
            border: 1px solid #415a7733;
        }

        .link-item:hover {
            background-color: #415a77;
            transform: translateY(-3px);
            border-color: #778da9;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .link-item i {
            margin-right: 20px;
            font-size: 1.4rem;
            width: 30px;
            text-align: center;
        }

        .label {
            font-size: 0.95rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="bg-animation"></div>

    <div class="container">
        <div class="lang-switch">
            <button class="lang-btn" onclick="changeLang('ja')">JP</button>
            <button class="lang-btn" onclick="changeLang('en')">EN</button>
            <button class="lang-btn" onclick="changeLang('ru')">RU</button>
        </div>

        <div class="profile">
            <img src="New_Channel.png" alt="We-san" id="profile-img">
            <h1>ウエさん / We-san</h1>
        </div>

        <div id="links">
            <a href="https://x.com/we_san69_pusher" class="link-item"><i class="fa-brands fa-twitter"></i> <span class="label">X / Twitter (個人アカウント)</span></a>
            <a href="https://x.com/wpusherman" class="link-item"><i class="fa-brands fa-twitter"></i> <span class="label">X / Twitter (動画投稿告知)</span></a>
            <a href="https://www.youtube.com/@we-san" class="link-item"><i class="fa-brands fa-youtube"></i> <span class="label">YouTube</span></a>
            <a href="https://we-san.com" class="link-item"><i class="fa-solid fa-square-rss"></i> <span class="label">ブログーウエさんの駄弁り場</span></a>
            <a href="https://www.instagram.com/wpusherman/" class="link-item"><i class="fa-brands fa-instagram"></i> <span class="label">Instagram</span></a>
            <a href="https://www.nicovideo.jp/user/118546116" class="link-item"><i class="fa-solid fa-video"></i> <span class="label">ニコニコ動画</span></a>
            <a href="https://discord.gg/DAdSg24FTe" class="link-item"><i class="fa-brands fa-discord"></i> <span class="label">Discordサーバー</span></a>
        </div>
    </div>

    <script>
        const translations = {
            ja: [
                "X / Twitter (個人アカウント)",
                "X / Twitter (動画投稿告知)",
                "YouTube",
                "ブログーウエさんの駄弁り場",
                "Instagram",
                "ニコニコ動画",
                "Discordサーバー"
            ],
            en: [
                "X / Twitter (Personal)",
                "X / Twitter (News)",
                "YouTube",
                "Blog - We-san's Chat Place",
                "Instagram",
                "Niconico",
                "Discord Server"
            ],
            ru: [
                "X / Twitter (Личный)",
                "X / Twitter (Анонсы)",
                "YouTube",
                "Блог - We-san's Chat Place",
                "Instagram",
                "Niconico",
                "Сервер Discord"
            ]
        };

        function changeLang(lang) {
            const labels = document.querySelectorAll('.label');
            translations[lang].forEach((text, index) => {
                labels[index].textContent = text;
            });
        }
    </script>
</body>
</html>
